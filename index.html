<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelexa Team Portal</title>
    <style>
        :root {
            --navy: #00004d;
            --electric-blue: #007bff;
            --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--navy); color: var(--white); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); width: 90%; max-width: 500px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        h2 { color: var(--electric-blue); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: rgba(255,255,255,0.9); font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--electric-blue); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 18px; margin-top: 10px; }
        button:hover { background: #0056b3; transform: scale(1.02); }
        .hidden { display: none; }
        .logo { width: 100px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container" id="login-box">
    <h2>GELEXA LOGIN</h2>
    <p>Welcome, Cheetah! Login to Drive the Brand.</p>
    <input type="text" id="username" placeholder="Team Member Name">
    <input type="password" id="password" placeholder="Password">
    <button onclick="checkLogin()">Login</button>
</div>

<div class="container hidden" id="dashboard">
    <h2>DASHBOARD</h2>
    <p>Select an option to continue:</p>
    <button onclick="showForm('appraisal')">Appraisal Form</button>
    <button onclick="showForm('interview')">Interview Form (Recruitment)</button>
    <button style="background: gray;" onclick="logout()">Logout</button>
</div>

<div class="container hidden" id="appraisal-form">
    <h2>APPRAISAL FORM</h2>
    <form action="YOUR_GOOGLE_FORM_LINK_HERE" method="POST">
        <input type="text" placeholder="તમે નવી કઈ સ્કીલ શીખ્યા?" required>
        <textarea placeholder="ઓફિસની બહાર તમે શું ઇમ્પ્લીમેન્ટ કર્યું?"></textarea>
        <input type="number" placeholder="Expected Increment (₹)" required>
        <textarea placeholder="નવા વર્ષ માટે તમારું કમિટમેન્ટ શું છે?"></textarea>
        <button type="submit">Submit Appraisal</button>
        <button type="button" onclick="goBack()" style="background:none; border:1px solid white;">Back</button>
    </form>
</div>

<div class="container hidden" id="interview-form">
    <h2>INTERVIEW FORM</h2>
    <form action="YOUR_GOOGLE_FORM_LINK_HERE" method="POST">
        <input type="text" placeholder="તમારું નામ" required>
        <select required>
            <option value="">પોઝિશન પસંદ કરો</option>
            <option>Graphic Designer</option>
            <option>Video Editor</option>
            <option>Web Developer</option>
        </select>
        <textarea placeholder="શા માટે Gelexa જોઈન કરવું છે?"></textarea>
        <p style="font-size: 12px;">શું તમે 1 વર્ષના બોન્ડ માટે તૈયાર છો? <input type="checkbox" required></p>
        <input type="number" placeholder="Expected Salary">
        <button type="submit">Apply Now</button>
        <button type="button" onclick="goBack()" style="background:none; border:1px solid white;">Back</button>
    </form>
</div>

<script>
    function checkLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        // Basic Security: તું અહિયાં તારા પાસવર્ડ સેટ કરી શકે છે
        if(user === "gelexa_team" && pass === "grit2026") {
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        } else {
            alert("Wrong Details! Only Cheetahs allowed.");
        }
    }

    function showForm(type) {
        document.getElementById('dashboard').classList.add('hidden');
        if(type === 'appraisal') document.getElementById('appraisal-form').classList.remove('hidden');
        if(type === 'interview') document.getElementById('interview-form').classList.remove('hidden');
    }

    function goBack() {
        document.getElementById('appraisal-form').classList.add('hidden');
        document.getElementById('interview-form').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
    }

    function logout() {
        location.reload();
    }
</script>

</body>
</html>
